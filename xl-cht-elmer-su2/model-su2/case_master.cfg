TIME_ITER         = 21600
MAX_TIME          = 21600
INNER_ITER        = 1
OUTER_ITER        = 200
WINDOW_START_ITER = 500

% ---------------------------------------------------------------------
% RESULTS AND OUTPUT PARAMETERS
